<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Einav's Partner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    background: radial-gradient(ellipse 120% 90% at 50% 30%, #131b3a 0%, #0a0e22 55%, #05060f 100%);
    color: #eef1ff;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100%;
    padding: max(24px, env(safe-area-inset-top)) 24px 40px;
  }
  header {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }
  header h1 {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 1px;
    direction: ltr;
    background: linear-gradient(90deg, #5cc8ff 0%, #a06bff 55%, #ffb27a 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 30px rgba(120, 110, 255, 0.35);
  }
  #gear {
    position: absolute;
    left: 0;
    background: none; border: none; font-size: 22px; color: #4a5380;
    cursor: pointer; padding: 8px;
  }

  #stage {
    flex: 1;
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 30px;
    text-align: center;
  }

  #english {
    font-size: 26px;
    color: #7d88b8;
    min-height: 32px;
    direction: ltr;
    letter-spacing: 0.5px;
  }
  #hebrew {
    font-size: 64px;
    font-weight: 700;
    min-height: 78px;
    line-height: 1.2;
    color: #ffffff;
    text-shadow: 0 0 24px rgba(124, 156, 255, 0.55);
  }
  #explanation {
    font-size: 24px;
    line-height: 1.6;
    color: #c8d0f2;
    max-width: 480px;
    background: rgba(38, 48, 96, 0.35);
    border: 1px solid rgba(130, 150, 255, 0.3);
    border-radius: 16px;
    padding: 18px 22px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none;
  }
  #explanation.show { display: block; }

  /* ---- glowing mic orb ---- */
  #micWrap { position: relative; width: 230px; height: 230px;
    display: flex; align-items: center; justify-content: center; }

  #aura {
    position: absolute; inset: 0;
    border-radius: 50%;
    background: conic-gradient(from 0deg,
      #3fb6ff, #7a5cff, #c45cff, #ff9d5c, #ffce8a, #3fb6ff);
    filter: blur(26px);
    opacity: 0.75;
    animation: spin 9s linear infinite;
  }
  #aura2 {
    position: absolute; inset: 22px;
    border-radius: 50%;
    background: conic-gradient(from 180deg,
      #ff9d5c, #c45cff, #3fb6ff, #7a5cff, #ff9d5c);
    filter: blur(14px);
    opacity: 0.55;
    animation: spin 14s linear infinite reverse;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #mic {
    position: relative;
    width: 160px; height: 160px;
    border-radius: 50%;
    border: 2px solid rgba(160, 180, 255, 0.45);
    background: radial-gradient(circle at 50% 38%, #1a2247 0%, #0c1230 70%, #080c22 100%);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 40px rgba(110, 120, 255, 0.45),
                inset 0 0 30px rgba(80, 120, 255, 0.25);
    transition: transform 0.15s;
  }
  #mic:active { transform: scale(0.95); }
  #mic::before {
    content: '';
    position: absolute; inset: 14px;
    border-radius: 50%;
    border: 2px solid rgba(150, 170, 255, 0.35);
  }
  #mic svg { width: 62px; height: 62px; }
  #micIconGrad stop:nth-child(1) { stop-color: #5cc8ff; }
  #micIconGrad stop:nth-child(2) { stop-color: #b07aff; }
  #micIconGrad stop:nth-child(3) { stop-color: #ffb27a; }

  #micWrap.listening #aura  { opacity: 1;    animation-duration: 3.5s; }
  #micWrap.listening #aura2 { opacity: 0.85; animation-duration: 5s; }
  #micWrap.listening #mic   { border-color: rgba(255, 160, 120, 0.7);
    box-shadow: 0 0 60px rgba(196, 92, 255, 0.65), inset 0 0 36px rgba(140, 100, 255, 0.35); }
  #micWrap.busy #aura, #micWrap.busy #aura2 { opacity: 0.25; }
  #micWrap.busy #mic { box-shadow: 0 0 18px rgba(110, 120, 255, 0.25); }

  .pulse {
    position: absolute; inset: 28px;
    border-radius: 50%;
    border: 3px solid rgba(196, 130, 255, 0.8);
    opacity: 0;
    pointer-events: none;
  }
  #micWrap.listening .pulse { animation: pulse 1.6s ease-out infinite; }
  @keyframes pulse {
    0%   { transform: scale(1);    opacity: 0.8; }
    100% { transform: scale(1.45); opacity: 0; }
  }

  #status {
    font-size: 20px;
    color: #7d88b8;
    min-height: 28px;
  }
  #status.hint { color: #8fd0ff; font-weight: 600; text-shadow: 0 0 16px rgba(90, 180, 255, 0.4); }
  #status.error { color: #ff8a7a; }

  /* settings panel */
  #settings {
    display: none;
    position: fixed; inset: 0;
    background: rgba(4, 6, 16, 0.7);
    align-items: center; justify-content: center;
    padding: 24px;
    z-index: 10;
  }
  #settings.show { display: flex; }
  #settingsCard {
    background: #121838;
    border: 1px solid rgba(130, 150, 255, 0.3);
    border-radius: 18px;
    padding: 26px;
    width: 100%; max-width: 420px;
    display: flex; flex-direction: column; gap: 14px;
    box-shadow: 0 0 60px rgba(110, 120, 255, 0.25);
  }
  #settingsCard h2 { font-size: 19px; color: #eef1ff; }
  #settingsCard label { font-size: 14px; color: #7d88b8; }
  #settingsCard input {
    width: 100%;
    font-size: 16px;
    padding: 12px;
    border: 1px solid rgba(130, 150, 255, 0.35);
    border-radius: 10px;
    direction: ltr;
    background: #0a0f28;
    color: #eef1ff;
  }
  #settingsCard button {
    font-size: 17px; font-weight: 600;
    padding: 13px;
    border: none; border-radius: 10px;
    background: linear-gradient(90deg, #3f7bff, #8c5cff);
    color: #fff;
    cursor: pointer;
  }
</style>
</head>
<body>

<header>
  <button id="gear" aria-label="הגדרות">⚙︎</button>
  <h1>Einav's Partner</h1>
</header>

<div id="stage">
  <div id="english"></div>
  <div id="hebrew"></div>
  <div id="explanation"></div>
  <div id="micWrap">
    <div id="aura"></div>
    <div id="aura2"></div>
    <button id="mic" aria-label="מיקרופון">
      <svg viewBox="0 0 24 24">
        <defs>
          <linearGradient id="micIconGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"/><stop offset="55%"/><stop offset="100%"/>
          </linearGradient>
        </defs>
        <g fill="url(#micIconGrad)">
          <path d="M12 14a3 3 0 0 0 3-3V5a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3z"/>
          <path d="M19 11a1 1 0 1 0-2 0 5 5 0 0 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.93V20H8a1 1 0 1 0 0 2h8a1 1 0 1 0 0-2h-3v-2.07A7 7 0 0 0 19 11z"/>
        </g>
      </svg>
    </button>
    <div class="pulse"></div>
  </div>
  <div id="status">לחצי על המיקרופון ואמרי מילה באנגלית</div>
</div>

<div id="settings">
  <div id="settingsCard">
    <h2>הגדרות</h2>
    <label>OpenAI API Key</label>
    <input id="keyInput" type="password" placeholder="sk-..." autocomplete="off">
    <label>מודל</label>
    <input id="modelInput" type="text" autocomplete="off">
    <button id="saveSettings">שמירה</button>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const micBtn = $('mic'), micWrap = $('micWrap'), statusEl = $('status');
const englishEl = $('english'), hebrewEl = $('hebrew'), explEl = $('explanation');

const DEFAULT_MODEL = 'gpt-5.4-mini';
let apiKey = localStorage.getItem('milon_key') || '';
let model  = localStorage.getItem('milon_model') || DEFAULT_MODEL;

let state = 'idle';        // idle | listening | translating | speaking | expand | expanding
let currentWord = '', currentHebrew = '';
let activeRec = null;

const SYS_TRANSLATE =
  'You are an English-Hebrew dictionary. The user says one English word ' +
  '(it may be slightly mis-transcribed from speech; infer the most likely intended word). ' +
  'Reply with ONLY the single most accurate Hebrew translation: one Hebrew word, ' +
  'no niqqud, no punctuation, no explanation, nothing else.';

const SYS_EXPLAIN =
  'You explain English words to a Hebrew speaker. Given an English word and its Hebrew translation, ' +
  'reply with one or two short, simple Hebrew sentences that explain the meaning of the word clearly. ' +
  'Hebrew only, no niqqud, no English.';

/* ---------- TTS ---------- */
let voicesReady = speechSynthesis.getVoices();
speechSynthesis.onvoiceschanged = () => { voicesReady = speechSynthesis.getVoices(); };

function unlockTTS() {
  const u = new SpeechSynthesisUtterance(' ');
  u.volume = 0;
  speechSynthesis.speak(u);
}

function speak(text, onDone) {
  let finished = false;
  const done = () => { if (!finished) { finished = true; onDone && onDone(); } };
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'he-IL';
  const v = voicesReady.find(v => v.lang && v.lang.toLowerCase().startsWith('he'));
  if (v) u.voice = v;
  u.rate = 0.95;
  u.onend = done;
  u.onerror = done;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
  // iOS sometimes drops onend — safety fallback scaled to text length
  setTimeout(done, 1500 + text.length * 130);
}

/* ---------- Speech recognition ---------- */
function listen(lang, { onResult, onMiss, timeout }) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { setStatus('הדפדפן לא תומך בזיהוי דיבור — נסי בספארי', 'error'); reset(); return; }
  const rec = new SR();
  activeRec = rec;
  rec.lang = lang;
  rec.interimResults = false;
  rec.maxAlternatives = 1;
  let got = false, timer = null;
  rec.onresult = e => {
    got = true;
    clearTimeout(timer);
    onResult(e.results[0][0].transcript || '');
  };
  rec.onend = () => {
    clearTimeout(timer);
    activeRec = null;
    if (!got && onMiss) onMiss();
  };
  rec.onerror = () => {}; // onend fires afterwards either way
  try { rec.start(); } catch (e) {}
  if (timeout) timer = setTimeout(() => { try { rec.stop(); } catch (e) {} }, timeout);
}

function stopListening() {
  if (activeRec) { try { activeRec.abort(); } catch (e) {} activeRec = null; }
}

/* ---------- OpenAI ---------- */
let goodVariant = 0; // remember which param combo this model accepts
async function ask(system, user, maxTokens) {
  const messages = [{ role: 'system', content: system }, { role: 'user', content: user }];
  // different model families accept different params — walk the variants on 400
  const variants = [
    { model, messages, max_completion_tokens: maxTokens, reasoning_effort: 'minimal' },
    { model, messages, max_completion_tokens: maxTokens },
    { model, messages, max_tokens: maxTokens },
    { model, messages }
  ];
  let lastMsg = '';
  for (let i = goodVariant; i < variants.length; i++) {
    const r = await fetch('https://api.openai.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
      body: JSON.stringify(variants[i])
    });
    if (r.ok) {
      goodVariant = i;
      const j = await r.json();
      return (j.choices[0].message.content || '').trim();
    }
    try { lastMsg = (await r.json()).error.message || ''; } catch (e) { lastMsg = ''; }
    if (r.status === 401) throw new Error('מפתח API לא תקין — בדקי בהגדרות');
    if (r.status === 404) throw new Error('המודל "' + model + '" לא נמצא — בדקי את שם המודל בהגדרות ⚙︎');
    if (r.status !== 400) throw new Error('שגיאת API ' + r.status + (lastMsg ? ': ' + lastMsg : ''));
  }
  throw new Error('שגיאת API 400' + (lastMsg ? ': ' + lastMsg : ''));
}

/* ---------- Flow ---------- */
function setStatus(text, cls) {
  statusEl.textContent = text;
  statusEl.className = cls || '';
}

function setMic(cls) { micWrap.className = cls || ''; }

function reset() {
  stopListening();
  state = 'idle';
  setMic('');
  setStatus('לחצי על המיקרופון ואמרי מילה באנגלית');
}

micBtn.addEventListener('click', () => {
  if (!apiKey) { openSettings(); return; }
  if (state !== 'idle') { speechSynthesis.cancel(); reset(); return; }
  unlockTTS();
  englishEl.textContent = '';
  hebrewEl.textContent = '';
  explEl.className = '';
  explEl.textContent = '';
  state = 'listening';
  setMic('listening');
  setStatus('מקשיבה... אמרי מילה באנגלית');
  listen('en-US', {
    onResult: handleWord,
    onMiss: () => { if (state === 'listening') reset(); },
    timeout: 8000
  });
});

async function handleWord(text) {
  currentWord = text.trim();
  englishEl.textContent = currentWord;
  state = 'translating';
  setMic('busy');
  setStatus('מתרגמת...');
  try {
    currentHebrew = await ask(SYS_TRANSLATE, currentWord, 200);
    hebrewEl.textContent = currentHebrew;
    state = 'speaking';
    speak(currentHebrew, startExpandWindow);
  } catch (e) {
    setStatus(e.message, 'error');
    state = 'idle';
    setMic('');
  }
}

function startExpandWindow() {
  if (state !== 'speaking') return;
  state = 'expand';
  setMic('listening');
  setStatus('להסבר נוסף — אמרי "תפרט"', 'hint');
  listen('he-IL', {
    onResult: t => { isTrigger(t) ? doExpand() : reset(); },
    onMiss: () => { if (state === 'expand') reset(); },
    timeout: 6000
  });
}

function isTrigger(t) {
  const s = (t || '').toLowerCase();
  return /תפרט|פרט|הסבר|tefaret|t.?far.?et|ferret/.test(s);
}

async function doExpand() {
  state = 'expanding';
  setMic('busy');
  setStatus('מכינה הסבר...');
  try {
    const expl = await ask(SYS_EXPLAIN,
      'Word: ' + currentWord + '\nHebrew translation: ' + currentHebrew, 400);
    explEl.textContent = expl;
    explEl.className = 'show';
    setStatus('');
    speak(expl, reset);
  } catch (e) {
    setStatus(e.message, 'error');
    state = 'idle';
    setMic('');
  }
}

/* ---------- Settings ---------- */
function openSettings() {
  $('keyInput').value = apiKey;
  $('modelInput').value = model;
  $('settings').className = 'show';
}
$('gear').addEventListener('click', openSettings);
$('saveSettings').addEventListener('click', () => {
  apiKey = $('keyInput').value.trim();
  model = $('modelInput').value.trim() || DEFAULT_MODEL;
  localStorage.setItem('milon_key', apiKey);
  localStorage.setItem('milon_model', model);
  $('settings').className = '';
  if (apiKey) setStatus('לחצי על המיקרופון ואמרי מילה באנגלית');
});
$('settings').addEventListener('click', e => {
  if (e.target === $('settings')) $('settings').className = '';
});

if (!apiKey) setStatus('לחצי על ⚙︎ והכניסי מפתח API כדי להתחיל', 'hint');
</script>
</body>
</html>
